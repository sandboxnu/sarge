services:
    web:
        container_name: sarge_web
        build:
            context: .
            dockerfile: Dockerfile
        ports:
            - '3000:3000'
        environment:
            DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
        depends_on:
            - db
            - ws
        volumes:
            - .:/app
            - /app/node_modules
    ws:
        container_name: sarge_ws
        build:
            context: ./src/ws/
            dockerfile: Dockerfile
        ports:
            - '8080:8080'
    db:
        image: postgres:17
        container_name: sarge_db
        restart: unless-stopped
        environment:
            POSTGRES_USER: ${DB_USER}
            POSTGRES_PASSWORD: ${DB_PASSWORD}
            POSTGRES_DB: ${DB_NAME}
        ports:
            - '5432:5432'
        volumes:
            - postgres_data:/var/lib/postgresql/data

volumes:
    postgres_data:

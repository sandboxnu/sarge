name: Publish Docker Images to GHCR

on:
    push:
        branches: [main]
    workflow_dispatch:

permissions:
    contents: read
    packages: write

jobs:
    publish:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}
            - name: Build and push web image
              uses: docker/build-push-action@v5
              with:
                  context: .
                  file: Dockerfile
                  push: true
                  tags: |
                      ghcr.io/${{ github.repository_owner }}/sarge-web:latest
                      ghcr.io/${{ github.repository_owner }}/sarge-web:${{ github.sha }}
            - name: Build and push ws image
              uses: docker/build-push-action@v5
              with:
                  context: src/ws
                  file: src/ws/Dockerfile
                  push: true
                  tags: |
                      ghcr.io/${{ github.repository_owner }}/sarge-ws:latest
                      ghcr.io/${{ github.repository_owner }}/sarge-ws:${{ github.sha }}
            - name: Build and push scheduler image
              uses: docker/build-push-action@v5
              with:
                  context: src/scheduler
                  file: src/scheduler/Dockerfile
                  push: true
                  tags: |
                      ghcr.io/${{ github.repository_owner }}/sarge-scheduler:latest
                      ghcr.io/${{ github.repository_owner }}/sarge-scheduler:${{ github.sha }}

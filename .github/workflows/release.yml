name: Release and Upload to GHCR

on:
    push:
        tags: ['v*']
    workflow_dispatch:

permissions:
    contents: write
    packages: write

jobs:
    release:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-go@v5
              with:
                  go-version-file: src/install/go.mod
            - name: Build binaries
              working-directory: src/install
              env:
                  CGO_ENABLED: 0
                  GOOS: linux
              run: |
                  for arch in amd64 arm64; do
                    GOARCH=$arch go build -ldflags="-s -w" -o sarge-linux-$arch .
                  done
            - name: Create release with binaries
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  gh release create "${{ github.ref_name }}" \
                    src/install/sarge-linux-amd64 \
                    src/install/sarge-linux-arm64 \
                    --generate-notes

    publish-images:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}
            - name: Build and push web image
              uses: docker/build-push-action@v5
              with:
                  context: .
                  file: Dockerfile
                  push: true
                  tags: |
                      ghcr.io/${{ github.repository_owner }}/sarge-web:${{ github.ref_name }}
                      ghcr.io/${{ github.repository_owner }}/sarge-web:latest
            - name: Build and push ws image
              uses: docker/build-push-action@v5
              with:
                  context: src/ws
                  file: src/ws/Dockerfile
                  push: true
                  tags: |
                      ghcr.io/${{ github.repository_owner }}/sarge-ws:${{ github.ref_name }}
                      ghcr.io/${{ github.repository_owner }}/sarge-ws:latest

version: 2

builds:
  - id: sarge
    dir: src/install
    main: .
    binary: sarge-{{ .Os }}-{{ .Arch }}
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w

archives:
  - id: bare
    formats: [binary]
    name_template: "{{ .Binary }}"

checksum:
  name_template: 'checksums.txt'

release:
  draft: false
  prerelease: auto
  mode: replace

snapshot:
  version_template: "{{ .Tag }}-dev"
